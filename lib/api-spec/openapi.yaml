      properties:
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: string
        color:
          type: ["string", "null"]
        entitled:
          type: number
        taken:
          type: number
        remaining:
          type: number

    # ── ATTENDANCE ────────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
