components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── AUTH ─────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, employee, superadmin]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, email, role, tenantId]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        tenantId:
          type: ["integer", "null"]
        tenantName:
          type: ["string", "null"]
        tenantLogo:
          type: ["string", "null"]
        isSuperAdmin:
          type: boolean
        employeeId:
          type: ["integer", "null"]

    # ── EMPLOYEE ─────────────────────────────────────────────────────────────
    Employee:
      type: object
      required: [id, employeeNumber, firstName, lastName, email, status]
      properties:
        id:
          type: integer
        employeeNumber:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        photo:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        nationalId:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        branchId:
          type: ["integer", "null"]
        branchName:
          type: ["string", "null"]
        managerId:
          type: ["integer", "null"]
        managerName:
          type: ["string", "null"]
        dateJoined:
          type: ["string", "null"]
        probationEnd:
          type: ["string", "null"]
        employmentType:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, terminated, on_leave]
        basicSalary:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        bankName:
          type: ["string", "null"]
        iban:
          type: ["string", "null"]

    EmployeeInput:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        gender:
          type: string
        birthDate:
          type: string
        nationality:
          type: string
        nationalId:
          type: string
        jobTitle:
          type: string
        departmentId:
          type: ["integer", "null"]
        branchId:
          type: ["integer", "null"]
        managerId:
          type: ["integer", "null"]
        dateJoined:
          type: string
        employmentType:
          type: string
        basicSalary:
          type: number
        currency:
          type: string

    EmployeeUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        jobTitle:
          type: string
        departmentId:
          type: ["integer", "null"]
        branchId:
          type: ["integer", "null"]
        managerId:
          type: ["integer", "null"]
        status:
          type: string
        basicSalary:
          type: number
        bankName:
          type: string
        iban:
          type: string

    EmployeeStats:
      type: object
      required: [total, active, onLeave, newThisMonth, departments]
      properties:
        total:
          type: integer
        active:
          type: integer
        onLeave:
          type: integer
        newThisMonth:
          type: integer
        terminated:
          type: integer
        departments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
